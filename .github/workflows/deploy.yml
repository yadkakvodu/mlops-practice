name: CD Pipeline (Deploy to HF Spaces)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pull Model from DVC
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.NAMENAME }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET }}
        run: |
          python -m pip install --upgrade pip
          pip install "dvc[s3]"
          dvc pull

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.TOKENTOKEN }}
          HF_USER: nedinislam
          SPACE_NAME: iris-api-alipkachev
        run: |
          git config --global user.email "bot@github.actions"
          git config --global user.name "GitHub CD Bot"

          rm -rf space_repo

          echo "Token length: ${#HF_TOKEN}"

          git clone https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_USER}/${SPACE_NAME} space_repo

          mkdir -p space_repo/src
          mkdir -p space_repo/models

          cp src/app.py space_repo/app.py
          cp -r src/* space_repo/src/

          cp -r models/* space_repo/models/

          [ -f requirements.txt ] && cp requirements.txt space_repo/
          [ -f Dockerfile ] && cp Dockerfile space_repo/

          find space_repo -name "mlflow.db" -type f -delete
          find space_repo -name "__pycache__" -type d -exec rm -rf {} +

          cd space_repo

          git add .

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Automatic deploy from GitHub Actions"

          git remote set-url origin https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_USER}/${SPACE_NAME}

          git remote -v

          git push origin main