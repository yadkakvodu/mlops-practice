name: Train and Report (CML)

on:
  pull_request:
    branches: ["main"]

permissions:
  pull-requests: write
  contents: read

jobs:
  run-experiment:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install cml

      - name: Download data
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.namename }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.secret }}
        run: dvc pull

      - name: Train model
        run: dvc repro

      - name: Create CML report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Результаты эксперимента" > report.md

          echo "### Изменения параметров" >> report.md
          dvc params diff main --md >> report.md

          echo "### Изменения метрик" >> report.md
          dvc metrics diff main --md >> report.md

          cml comment create report.md